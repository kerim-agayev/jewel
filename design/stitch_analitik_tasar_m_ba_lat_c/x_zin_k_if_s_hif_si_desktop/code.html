<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        
        /* Hexagon Grid Styles */
        .hex-grid {
            display: flex;
            flex-wrap: wrap;
            width: 100vw;
            justify-content: center;
            align-content: center;
            margin-top: 2rem;
            margin-bottom: 6rem;
            padding: 0;
            overflow: hidden;
            position: relative;
        }

        .hex {
            width: 120px;
            height: 138px; /* width * 1.1547 */
            position: relative;
            margin: 0 -15px -34.64px -15px; /* Adjust spacing to overlap */
            clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
            background-color: #2a2a2a;
            transition: transform 0.3s ease, z-index 0s 0.3s;
            cursor: pointer;
            z-index: 1;
        }

        .hex:hover {
            transform: scale(1.15);
            z-index: 10;
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275), z-index 0s;
            box-shadow: 0 0 30px rgba(197, 160, 89, 0.4); /* Gold glow */
        }
        
        .hex-content {
            width: 100%;
            height: 100%;
            background-size: cover;
            background-position: center;
            opacity: 0.8;
            transition: opacity 0.3s ease, filter 0.3s ease;
            filter: grayscale(40%) sepia(20%) hue-rotate(-10deg) brightness(0.9); /* Vintage/Mysterious tone */
        }

        .hex:hover .hex-content {
            opacity: 1;
            filter: none;
        }
        
        /* Subtle gold overlay for that warm glint */
        .hex::after {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(135deg, rgba(197, 160, 89, 0.2) 0%, rgba(0,0,0,0) 50%, rgba(26,26,26,0.6) 100%);
            pointer-events: none;
            transition: opacity 0.3s ease;
        }
        
        .hex:hover::after {
            opacity: 0;
        }

        /* Stagger rows */
        .hex-grid::before {
            content: "";
            width: 60px;
            float: left;
            height: 100%;
            shape-outside: repeating-linear-gradient(#0000 0 103.92px, #000 0 207.84px);
        }
        
        /* Create an ambient glow behind the mosaic */
        .ambient-glow {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 80vw;
            height: 80vh;
            background: radial-gradient(circle, rgba(197,160,89,0.05) 0%, rgba(26,26,26,0) 70%);
            pointer-events: none;
            z-index: 0;
        }
    </style>

<script>
        // Generate Hexagon Mosaic dynamically
        document.addEventListener('DOMContentLoaded', () => {
            const container = document.getElementById('mosaic-container');
            const numberOfCells = 50; // Dense packing

            for (let i = 0; i < numberOfCells; i++) {
                const hex = document.createElement('div');
                hex.className = 'hex';
                
                const content = document.createElement('div');
                content.className = 'hex-content';
                
                // Add varied images with specific dark, warm luxury aesthetic prompts
                content.style.backgroundImage = "url('placeholder')";
                content.setAttribute('data-alt', `A moody, dark, macro photography shot of an exquisite gold and diamond jewelry piece resting on dark velvet. The lighting is low-key, featuring strong, warm golden glints that emphasize the intricate craftsmanship and luxury. The aesthetic is extremely high-end, mysterious, and cinematic, focusing closely on the texture of the precious metals and stones against a deep charcoal background. Image ${i}`);
                
                hex.appendChild(content);
                container.appendChild(hex);
            }
        });
    </script>
