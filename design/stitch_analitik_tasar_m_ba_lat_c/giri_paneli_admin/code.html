<body class="bg-surface-container-high min-h-screen flex items-center justify-center p-4 antialiased">
<!-- Login Card Container -->
<div class="bg-surface-container-lowest w-full max-w-[440px] rounded-2xl shadow-[0px_4px_20px_rgba(26,26,26,0.04)] p-8 md:p-12 border border-outline-variant/30 flex flex-col items-center">
<!-- Logo Section -->
<div class="mb-8 flex flex-col items-center">
<span class="material-symbols-outlined text-antique-gold text-[48px] mb-4" data-weight="fill" style="font-variation-settings: 'FILL' 1;">diamond</span>
<h1 class="font-headline-md text-headline-md text-charcoal-text text-center tracking-tight">Anar Jewellery</h1>
<p class="font-body-md text-body-md text-on-surface-variant mt-2">İdarəetmə Paneli</p>
</div>
<!-- Form Section -->
<form action="#" class="w-full flex flex-col gap-6" method="POST">
<!-- Email/Username Field -->
<div class="flex flex-col gap-2">
<label class="font-label-md text-label-md text-on-surface-variant" for="username">E-poçt və ya istifadəçi adı</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline">person</span>
<input class="w-full bg-surface-container-lowest border border-outline-variant text-charcoal-text font-body-md text-body-md rounded-lg pl-10 pr-4 py-3 focus:outline-none focus:ring-1 focus:ring-antique-gold focus:border-antique-gold transition-colors placeholder:text-outline/60" id="username" name="username" placeholder="Daxil edin..." required="" type="text"/>
</div>
</div>
<!-- Password Field -->
<div class="flex flex-col gap-2">
<label class="font-label-md text-label-md text-on-surface-variant" for="password">Şifrə</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline">lock</span>
<input class="w-full bg-surface-container-lowest border border-outline-variant text-charcoal-text font-body-md text-body-md rounded-lg pl-10 pr-4 py-3 focus:outline-none focus:ring-1 focus:ring-antique-gold focus:border-antique-gold transition-colors placeholder:text-outline/60" id="password" name="password" placeholder="••••••••" required="" type="password"/>
</div>
</div>
<!-- Remember Me & Forgot Password -->
<div class="flex items-center justify-between mt-2">
<label class="flex items-center gap-2 cursor-pointer group">
<input class="form-checkbox h-4 w-4 text-antique-gold border-outline-variant rounded focus:ring-antique-gold focus:ring-offset-surface-container-lowest transition-colors bg-surface-container-lowest" type="checkbox"/>
<span class="font-label-md text-label-md text-on-surface-variant group-hover:text-charcoal-text transition-colors">Yadda saxla</span>
</label>
</div>
<!-- Submit Button -->
<button class="w-full bg-antique-gold text-charcoal-text font-label-md text-label-md py-3.5 px-6 rounded-lg hover:bg-gold-dark transition-colors duration-200 mt-4 shadow-sm font-semibold" type="submit">
                Daxil ol
            </button>
</form>
</div>
